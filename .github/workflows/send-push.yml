name: Send Push Notifications

on:
  workflow_dispatch:
    inputs:
      message:
        description: "Broadcast message to send to all players"
        required: true
        type: string
      tournament_id:
        description: "Tournament ID (e.g. tournament_cotolengo_prode_2026_mpgfaphu)"
        required: true
        type: string

jobs:
  send-push:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: scripts/package.json

      - name: Install dependencies
        working-directory: scripts
        run: npm ci

      - name: Send push notifications
        working-directory: scripts
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          TOURNAMENT_ID: ${{ github.event.inputs.tournament_id }}
          PUSH_MESSAGE: ${{ github.event.inputs.message }}
        run: node send-push.js
